name: update-news-feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  refresh-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build news feed
        run: python tools/news/fetch_news.py --output assets/data/news.json

      - name: Commit updated news feed
        run: |
          if git diff --quiet -- assets/data/news.json; then
            echo "news.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/news.json
          git commit -m "Update news feed"
          git push
