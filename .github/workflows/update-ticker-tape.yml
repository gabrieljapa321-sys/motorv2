name: update-ticker-tape

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  refresh-ticker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build ticker tape
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: python tools/market/fetch_ticker_tape.py --output assets/data/ticker-tape.json

      - name: Commit updated ticker tape
        run: |
          if git diff --quiet -- assets/data/ticker-tape.json; then
            echo "ticker-tape.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/ticker-tape.json
          git commit -m "Update ticker tape"
          git push
